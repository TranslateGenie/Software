name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Electron app dependencies
        run: npm ci --prefix electron

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Generate production .env
        shell: bash
        env:
          S_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          S_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S_AWS_REGION: ${{ secrets.AWS_REGION }}
          S_AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          S_LICENSES_PATH: ${{ secrets.LICENSES_PATH }}
          S_AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          S_AZURE_TRANSLATOR_ENDPOINT: ${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}
          S_AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          S_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ secrets.DOCUMENT_INTELLIGENCE_ENDPOINT }}
          S_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.DOCUMENT_INTELLIGENCE_KEY }}
          S_AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          S_AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          S_AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          S_MDAS_ADMIN_PASSWORD: ${{ secrets.MDAS_ADMIN_PASSWORD }}
        run: |
          {
            echo "MDAS_ENV=prod"
            echo "AWS_ACCESS_KEY_ID=${S_AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${S_AWS_SECRET_ACCESS_KEY}"
            echo "AWS_REGION=${S_AWS_REGION}"
            echo "AWS_S3_BUCKET=${S_AWS_S3_BUCKET}"
            echo "LICENSES_PATH=${S_LICENSES_PATH}"
            echo "AZURE_TRANSLATOR_KEY=${S_AZURE_TRANSLATOR_KEY}"
            echo "AZURE_TRANSLATOR_ENDPOINT=${S_AZURE_TRANSLATOR_ENDPOINT}"
            echo "AZURE_TRANSLATOR_REGION=${S_AZURE_TRANSLATOR_REGION}"
            echo "DOCUMENT_INTELLIGENCE_ENDPOINT=${S_DOCUMENT_INTELLIGENCE_ENDPOINT}"
            echo "DOCUMENT_INTELLIGENCE_KEY=${S_DOCUMENT_INTELLIGENCE_KEY}"
            echo "AZURE_OPENAI_ENDPOINT=${S_AZURE_OPENAI_ENDPOINT}"
            echo "AZURE_OPENAI_KEY=${S_AZURE_OPENAI_KEY}"
            echo "AZURE_OPENAI_DEPLOYMENT=${S_AZURE_OPENAI_DEPLOYMENT}"
            echo "LOCAL_HELPER_PORT=8787"
            echo "PRICING_PAGE_URL=https://translategenie.github.io/pricing.html"
            echo "LICENSE_SIGNATURE_REQUIRED=false"
            echo "MDAS_ADMIN_PASSWORD=${S_MDAS_ADMIN_PASSWORD}"
          } > electron/.env

      - name: Stamp version from tag
        shell: pwsh
        run: |
          # Derive the release version and write it into electron/package.json so
          # electron-builder stamps it into the installer and latest.yml. The tag
          # is the single source of truth — without this, the build always ships
          # the hardcoded package.json version and clients never see an update.
          $ver = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($ver)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $ver = "${{ github.ref_name }}"
            } else {
              $ver = "0.0.${{ github.run_number }}"
            }
          }
          # electron-builder wants a bare semver (no leading "v").
          $ver = $ver.TrimStart('v','V')
          Write-Output "Stamping version: $ver"
          npm version $ver --no-git-tag-version --allow-same-version --prefix electron

      - name: Build Electron app
        run: npm run build --prefix electron
        env:
          # Optionally set INSTALLER_URL for download handler
          # This will be replaced with the actual release URL after publishing
          INSTALLER_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mdas-installer.exe
          # Azure Trusted Signing credentials. electron-builder's azureSignOptions signs the
          # installer during this step (before latest.yml's hash is computed, so the signed
          # binary and the auto-update feed stay consistent). Auth is a service principal read
          # by @azure/identity's DefaultAzureCredential from these env vars.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: List build artifacts
        run: |
          ls -R electron/dist
        shell: pwsh

      - name: Verify Authenticode signature
        # electron-builder already signed the installer during the build step (azureSignOptions).
        # This confirms the signature is valid and fails the release if signing silently didn't
        # happen — e.g. a missing/expired AZURE_CLIENT_SECRET or a revoked signer role.
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "electron/dist" -Filter "*.exe" -Recurse -File |
            Where-Object { $_.FullName -notmatch 'win-unpacked' } |
            Sort-Object Length -Descending | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer .exe found to verify"; exit 1 }
          $sig = Get-AuthenticodeSignature $installer.FullName
          Write-Output "Installer: $($installer.Name)"
          Write-Output "Signature status: $($sig.Status)"
          Write-Output "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            Write-Error "Installer is not validly signed (status: $($sig.Status))"
            exit 1
          }

      - name: Resolve release metadata
        id: meta
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $tag = "v${{ github.run_number }}"
            }
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $isPrerelease = if ("${{ github.ref_type }}" -eq "tag") { "false" } else { "true" }

          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=Release $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.meta.outputs.tag_name }}"
          $name = "${{ steps.meta.outputs.release_name }}"

          gh release view "$tag" *> $null
          if ($LASTEXITCODE -ne 0) {
            if ("${{ steps.meta.outputs.prerelease }}" -eq "true") {
              gh release create "$tag" --title "$name" --notes "Automated pre-release build." --prerelease
            } else {
              gh release create "$tag" --title "$name" --notes "Automated release build."
            }
          } else {
            if ("${{ steps.meta.outputs.prerelease }}" -eq "true") {
              gh release edit "$tag" --title "$name" --prerelease
            } else {
              gh release edit "$tag" --title "$name"
            }
          }
        shell: pwsh

      - name: Find and upload installer
        id: upload_installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the built installer while excluding unpacked app binaries.
          $installers = Get-ChildItem -Path "electron/dist" -Filter "*.exe" -Recurse -File |
            Where-Object { $_.FullName -notmatch 'win-unpacked' } |
            Sort-Object Length -Descending
          if ($installers.Count -eq 0) {
            Write-Error "No .exe files found in electron/dist"
            exit 1
          }

          $installer = $installers[0]
          Write-Output "Uploading installer: $($installer.FullName)"

          # Upload using Electron Builder's native filename.
          gh release upload "${{ steps.meta.outputs.tag_name }}" "$($installer.FullName)" --clobber

          # Upload the auto-update metadata that electron-updater needs to detect
          # new versions: latest.yml plus the installer's .blockmap (used for
          # differential downloads). Without latest.yml, "Check Updates" 404s.
          $updateFiles = Get-ChildItem -Path "electron/dist" -File |
            Where-Object { $_.Name -eq 'latest.yml' -or $_.Name -like '*.blockmap' }
          if (-not ($updateFiles | Where-Object { $_.Name -eq 'latest.yml' })) {
            Write-Error "latest.yml not found in electron/dist — auto-update feed would be incomplete"
            exit 1
          }
          foreach ($f in $updateFiles) {
            Write-Output "Uploading update metadata: $($f.Name)"
            gh release upload "${{ steps.meta.outputs.tag_name }}" "$($f.FullName)" --clobber
          }

          $installerName = $installer.Name
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag_name }}/$installerName"
          "installer_name=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer_url=$installerUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Output installer URL
        run: |
          $installer_url = "${{ steps.upload_installer.outputs.installer_url }}"
          Write-Output "INSTALLER_URL=$installer_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Installer URL: $installer_url"
        shell: pwsh
