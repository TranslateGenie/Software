name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Electron app dependencies
        run: npm ci --prefix electron

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build Electron app
        run: npm run build --prefix electron
        env:
          # Optionally set INSTALLER_URL for download handler
          # This will be replaced with the actual release URL after publishing
          INSTALLER_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mdas-installer.exe

      - name: List build artifacts
        run: |
          ls -R electron/dist
        shell: pwsh

      - name: Sign installer
        if: github.ref_type == 'tag'
        # TODO: Uncomment and configure if you have a code signing certificate
        # Steps to set up:
        # 1. Store your .pfx certificate in GitHub Secrets as WINDOWS_CERT_B64
        # 2. Set the certificate password in GitHub Secrets as WINDOWS_CERT_PASSWORD
        # 3. Uncomment the following block
        #
        # run: |
        #   $cert_b64 = "${{ secrets.WINDOWS_CERT_B64 }}"
        #   $cert_path = "C:\temp\cert.pfx"
        #   [IO.File]::WriteAllBytes($cert_path, [Convert]::FromBase64String($cert_b64))
        #   $timestamp_server = "http://timestamp.globalsign.com/scripts/timstamp.dll"
        #   signtool sign /f $cert_path /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /t "$timestamp_server" "electron\dist\MDAS-*.exe"
        #   Remove-Item $cert_path
        # shell: pwsh
        run: echo "Code signing not configured yet. To enable, set WINDOWS_CERT_B64 and WINDOWS_CERT_PASSWORD secrets."

      - name: Resolve release metadata
        id: meta
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $tag = "v${{ github.run_number }}"
            }
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $isPrerelease = if ("${{ github.ref_type }}" -eq "tag") { "false" } else { "true" }

          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=Release $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer_url=https://github.com/${{ github.repository }}/releases/download/$tag/mdas-installer.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.meta.outputs.tag_name }}"
          $name = "${{ steps.meta.outputs.release_name }}"

          gh release view "$tag" *> $null
          if ($LASTEXITCODE -ne 0) {
            if ("${{ steps.meta.outputs.prerelease }}" -eq "true") {
              gh release create "$tag" --title "$name" --notes "Automated pre-release build." --prerelease
            } else {
              gh release create "$tag" --title "$name" --notes "Automated release build."
            }
          } else {
            if ("${{ steps.meta.outputs.prerelease }}" -eq "true") {
              gh release edit "$tag" --title "$name" --prerelease
            } else {
              gh release edit "$tag" --title "$name"
            }
          }
        shell: pwsh

      - name: Find and upload installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the built installer while excluding unpacked app binaries.
          $installers = Get-ChildItem -Path "electron/dist" -Filter "*.exe" -Recurse -File |
            Where-Object { $_.FullName -notmatch 'win-unpacked' } |
            Sort-Object Length -Descending
          if ($installers.Count -eq 0) {
            Write-Error "No .exe files found in electron/dist"
            exit 1
          }
          
          $installer = $installers[0]
          Write-Output "Uploading installer: $($installer.FullName)"
          
          # Upload with a stable filename so download URLs stay consistent.
          gh release upload "${{ steps.meta.outputs.tag_name }}" "$($installer.FullName)#mdas-installer.exe" --clobber
        shell: pwsh

      - name: Output installer URL
        run: |
          $installer_url = "${{ steps.meta.outputs.installer_url }}"
          Write-Output "INSTALLER_URL=$installer_url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Installer URL: $installer_url"
        shell: pwsh
